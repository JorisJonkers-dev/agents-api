name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  packages: write

env:
  GITHUB_ACTOR: ${{ github.actor }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        continue-on-error: true
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-image:
    name: Publish Container
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish agents-api image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/jorisjonkers-dev/agents-api/agents-api:${{ needs.release-please.outputs.tag_name }}
            ghcr.io/jorisjonkers-dev/agents-api/agents-api:${{ github.sha }}
          secrets: |
            github_token=${{ secrets.GITHUB_TOKEN }}
            github_actor=${{ github.actor }}
          build-args: |
            GIT_SHA=${{ needs.release-please.outputs.tag_name }}

  publish-api-clients:
    name: Publish API Clients
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    uses: JorisJonkers-dev/github-workflows/.github/workflows/publish-api-clients.yml@v0.7.0
    permissions:
      contents: read
      packages: write
      id-token: write
    with:
      spec-path: client-spec/openapi/agents-api.json
      api-name: agents-api
      version: ${{ needs.release-please.outputs.tag_name }}
      ts-package: "@jorisjonkers-dev/agents-api-client"
      maven-group: dev.jorisjonkers
      java-artifact: agents-api-client-java
      kotlin-artifact: agents-api-client-kotlin
      dry-run: false
    secrets:
      packages-token: ${{ secrets.GITHUB_TOKEN }}
      node-auth-token: ${{ secrets.GITHUB_TOKEN }}
